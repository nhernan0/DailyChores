<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Chore Tracker</title>
<style>
  body { font-family: 'Nunito', sans-serif; background: #f0f4f8; padding: 20px; }
  .stats { background: #2e7d32; color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
  .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; cursor: pointer; border: 3px solid #ddd; }
  .card.done { border-color: #2e7d32; background: #e8f5e9; }
  button { padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 10px; border: none; background: #fff; font-weight: bold; }
</style>
</head>
<body>

<div class="stats">
  <h2 id="name-display">Select Name</h2>
  <div id="user-select">
    <button onclick="setUser('Isabella')">Isabella</button>
    <button onclick="setUser('Michael')">Michael</button>
  </div>
  <h1 id="game-time" style="display:none;">0 Minutes Earned</h1>
  <p id="points-text" style="display:none;"></p>
</div>

<div id="chore-list"></div>

<script>
// 1. DEFINE YOUR CHORES HERE
const chores = [
  { id: 1, title: 'Brush Teeth', pts: 2 },
  { id: 2, title: 'Brush Hair', pts: 2 },
  { id: 3, title: 'Change Clothes', pts: 2 },
  { id: 4, title: 'Exercise: 20-30 miuntes', pts: 15 },
  { id: 5, title: '30 Minutes of Reading', pts: 10 },
  { id: 6, title: 'Arts and Crafts Activity', pts: 5 },
  { id: 7, title: 'Math Activity', pts: 5 },
  { id: 8, title: 'Language Arts Activity', pts: 5 },
  { id: 9, title: 'Science Activity', pts: 5 },
  { id: 10, title: 'Social Studies Activity', pts: 5 },
  { id: 11, title: 'Religious Ed Activity', pts: 5 },
  { id: 12, title: 'Wash/Dry Dishes', pts: 5 },
  { id: 13, title: 'Check/Change Trash', pts: 4 },
  { id: 14, title: 'Pick Up Toys at end of Day', pts: 10 }
];

let currentUser = '';

function setUser(name) {
  currentUser = name;
  checkDate();
  document.getElementById('name-display').textContent = name + "'s Chores";
  document.getElementById('game-time').style.display = 'block';
  document.getElementById('points-text').style.display = 'block';
  document.getElementById('user-select').style.display = 'none';
  render();
}

function checkDate() {
  const today = new Date().toDateString();
  const lastDateKey = `lastDate_${currentUser}`;
  if (localStorage.getItem(lastDateKey) !== today) {
    localStorage.setItem(`doneList_${currentUser}`, JSON.stringify([]));
    localStorage.setItem(lastDateKey, today);
  }
}

function render() {
  const doneList = JSON.parse(localStorage.getItem(`doneList_${currentUser}`) || '[]');
  const listDiv = document.getElementById('chore-list');
  listDiv.innerHTML = '';
  
  let totalPts = 0;
  chores.forEach(c => {
    const isDone = doneList.includes(c.id);
    if (isDone) totalPts += c.pts;
    
    const div = document.createElement('div');
    div.className = `card ${isDone ? 'done' : ''}`;
    div.innerHTML = `<strong>${c.title}</strong><span style="margin-left:auto">${c.pts} pts</span>`;
    div.onclick = () => {
      const newList = isDone ? doneList.filter(id => id !== c.id) : [...doneList, c.id];
      localStorage.setItem(`doneList_${currentUser}`, JSON.stringify(newList));
      render();
    };
    listDiv.appendChild(div);
  });

  const totalMinutes = Math.floor(totalPts / 20);
  document.getElementById('game-time').textContent = totalMinutes + " Minutes Earned";
  document.getElementById('points-text').textContent = totalPts + " points (" + (totalPts / 20).toFixed(1) + " minutes)";
}
</script>
</body>
</html>
