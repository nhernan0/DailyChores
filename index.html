<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon2" href="apple-touch-icon.png">
<title>Chore Tracker</title>
<style>
  body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #f3e5f5, #e1bee7); padding: 20px; min-height: 100vh; }
  .stats { background: #7b1fa2; color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
  .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; cursor: pointer; border: 3px solid #ddd; }
  .card.done { border-color: #7b1fa2; background: #f3e5f5; }
  button { padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 10px; border: none; background: #fff; font-weight: bold; color: #7b1fa2; }
</style>
</head>
<body>

<div class="stats">
  <h2 id="name-display">Select Name</h2>
  <div id="user-select">
    <button onclick="setUser('Isabella')">Isabella</button>
    <button onclick="setUser('Michael')">Michael</button>
  </div>
  <h1 id="game-time" style="display:none;">0 Minutes Earned</h1>
  <p id="points-text" style="display:none;"></p>
</div>

<div id="chore-list"></div>

<script>
const chores = [
  { id: 1, title: 'Brush Teeth Morning', pts: 1 },
  { id: 2, title: 'Brush Hair', pts: 2 },
  { id: 3, title: 'Change Clothes', pts: 2 },
  { id: 4, title: 'Make Bed', pts: 1 },
  { id: 5, title: 'Exercise at least 20-30 minutes', pts: 10 },
  { id: 6, title: 'At least 30 Minutes of Reading', pts: 10 },
  { id: 7, title: 'Arts and Crafts Activity', pts: 5 },
  { id: 8, title: 'Math Activity', pts: 6 },
  { id: 9, title: 'Language Arts or Writing Activity', pts: 6 },
  { id: 10, title: 'Science Activity', pts: 5 },
  { id: 11, title: 'Social Studies Activity', pts: 5 },
  { id: 12, title: 'Religious Ed Activity', pts: 5 },
  { id: 13, title: 'Wash/Dry Dishes', pts: 3 },
  { id: 14, title: 'Check/Change Trash', pts: 3 },
  { id: 15, title: 'Calmly Expressing Feelings/Frustrations', pts: 5 },
  { id: 16, title: 'Pick Up Toys at End of Day', pts: 5 },
  { id: 17, title: 'Brush Teeth Night', pts: 1 },
  { id: 18, title: 'Showing Kindness (determined by Mami or Daddy)', pts: 5 }
];

const penalties = [
  { id: 101, title: 'Talking Back', pts: 4 },
  { id: 102, title: 'Fighting', pts: 4 },
  { id: 103, title: 'Hitting or Throwing Items', pts: 4 },
  { id: 104, title: 'Not listening', pts: 4 },
  { id: 105, title: 'Incomplete Daily Chores', pts: 4 }
];

let currentUser = '';

function setUser(name) {
  currentUser = name;
  checkDate();
  document.getElementById('name-display').textContent = name + "'s Activities";
  document.getElementById('game-time').style.display = 'block';
  document.getElementById('points-text').style.display = 'block';
  document.getElementById('user-select').style.display = 'none';
  render();
}

function checkDate() {
  const now = new Date();
  const day = now.getDay();
  const diff = (day === 0 ? 6 : day - 1);
  const monday = new Date(now);
  monday.setDate(now.getDate() - diff);
  monday.setHours(0, 0, 0, 0);
  const mondayString = monday.toDateString();
  const lastMondayKey = `lastMonday_${currentUser}`;
  if (localStorage.getItem(lastMondayKey) !== mondayString) {
    localStorage.setItem(`doneList_${currentUser}`, JSON.stringify([]));
    localStorage.setItem(`penaltyList_${currentUser}`, JSON.stringify([]));
    localStorage.setItem(lastMondayKey, mondayString);
  }
}

function render() {
  const doneList = JSON.parse(localStorage.getItem(`doneList_${currentUser}`) || '[]');
  const penaltyList = JSON.parse(localStorage.getItem(`penaltyList_${currentUser}`) || '[]');
  const listDiv = document.getElementById('chore-list');
  
  // Clear only the content, not the container
  listDiv.innerHTML = ''; 

  // Add Chores Title
  const choreTitle = document.createElement('h3');
  choreTitle.textContent = 'Daily Activities';
  listDiv.appendChild(choreTitle);
  
  let totalPts = 0;
  
  chores.forEach(c => {
    const isDone = doneList.includes(c.id);
    if (isDone) totalPts += c.pts;
    const div = document.createElement('div');
    div.className = `card ${isDone ? 'done' : ''}`;
    div.innerHTML = `<strong>${c.title}</strong><span style="margin-left:auto">${c.pts} pts</span>`;
    
    // Use a standard click listener
    div.addEventListener('click', () => {
      const newList = isDone ? doneList.filter(id => id !== c.id) : [...doneList, c.id];
      localStorage.setItem(`doneList_${currentUser}`, JSON.stringify(newList));
      render();
    });
    listDiv.appendChild(div);
  });

  // Add Penalties Title
  const penaltyTitle = document.createElement('h3');
  penaltyTitle.textContent = 'Penalties';
  listDiv.appendChild(penaltyTitle);

  penalties.forEach(p => {
    const isApplied = penaltyList.includes(p.id);
    if (isApplied) totalPts -= p.pts;
    const div = document.createElement('div');
    div.className = `card ${isApplied ? 'done' : ''}`;
    div.style.borderColor = isApplied ? '#d32f2f' : '#ddd';
    div.innerHTML = `<strong>${p.title}</strong><span style="margin-left:auto">-${p.pts} pts</span>`;
    
    div.addEventListener('click', () => {
      const newList = isApplied ? penaltyList.filter(id => id !== p.id) : [...penaltyList, p.id];
      localStorage.setItem(`penaltyList_${currentUser}`, JSON.stringify(newList));
      render();
    });
    listDiv.appendChild(div);
  });

  const totalMinutes = Math.max(0, Math.floor(totalPts / 20));
  document.getElementById('game-time').textContent = totalMinutes + " Minutes Earned";
  document.getElementById('points-text').textContent = totalPts + " total points";
}
</script>
</body>
</html>
